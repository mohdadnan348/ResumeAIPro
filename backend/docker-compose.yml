# backend/docker-compose.yml
# Docker Compose configuration for ResumeAI Pro Backend

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: resume_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_ai
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - resume_ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin (Optional - Database GUI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: resume_ai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@resumeai.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - resume_ai_network
    profiles:
      - dev
      - gui

  # Backend API (Optional - for production)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_ai_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/resume_ai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - resume_ai_network
    profiles:
      - prod
      - full

  # Redis (Optional - for caching future)
  redis:
    image: redis:7-alpine
    container_name: resume_ai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - resume_ai_network
    profiles:
      - dev
      - full
      - cache

# Volumes for persistent data
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# Networks
networks:
  resume_ai_network:
    driver: bridge

# Docker Compose Usage:
# =====================
# Start only database:  docker-compose up -d postgres
# Start with pgadmin:   docker-compose --profile dev up -d
# Start full stack:     docker-compose --profile full up -d
# Stop all:            docker-compose down
# Stop + remove volumes: docker-compose down -v
# View logs:           docker-compose logs -f